<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Age Calculator</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, Helvetica, sans-serif;
      }

      body {
        min-height: 100vh;
        background: #f0f0f0;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
      }

      .content {
        width: 750px;
        background: white;
        padding: 45px;
        border-radius: 20px 20px 180px 20px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
      }

      .inputs {
        display: flex;
        gap: 20px;
      }

      /* IMPORTANT FOR CYPRESS */
      .input {
        display: flex;
        flex-direction: row;
      }

      .field {
        display: flex;
        flex-direction: column;
      }

      label {
        font-size: 12px;
        letter-spacing: 3px;
        color: #ff6b6b;
        font-weight: 700;
        margin-bottom: 8px;
      }

      input {
        width: 160px;
        height: 70px;
        border: 1px solid #dcdcdc;
        border-radius: 10px;
        padding: 15px;
        font-size: 32px;
        font-weight: 700;
        outline: none;
        transition: 0.3s;
      }

      input:focus {
        border-color: #854dff;
      }

      input:hover {
        border-color: #854dff;
      }

      .error {
        color: red;
        font-size: 12px;
        margin-top: 6px;
        font-style: italic;
        min-height: 16px;
      }

      .divider {
        display: flex;
        align-items: center;
        margin: 20px 0;
      }

      .divider hr {
        flex: 1;
        border: none;
        border-top: 1px solid #ddd;
      }

      #calculateBtn {
        width: 80px;
        height: 80px;
        border-radius: 50%;
        border: none;
        background: #854dff;
        color: white;
        font-size: 40px;
        cursor: pointer;
        transition: 0.3s;
        margin-left: 15px;
      }

      #calculateBtn:hover {
        background: black;
      }

      .results {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .result-line {
        font-size: 75px;
        font-style: italic;
        font-weight: 800;
        line-height: 1;
      }

      .result-line span {
        color: #854dff;
      }

      @media (max-width: 768px) {
        .content {
          width: 300px;
          padding: 25px;
          border-radius: 20px 20px 120px 20px;
        }

        .inputs {
          gap: 10px;
        }

        input {
          width: 75px;
          height: 55px;
          font-size: 24px;
          padding: 10px;
        }

        label {
          font-size: 10px;
        }

        .divider {
          position: relative;
          margin: 30px 0;
        }

        #calculateBtn {
          width: 65px;
          height: 65px;
          font-size: 32px;
          position: absolute;
          left: 50%;
          transform: translateX(-50%);
          margin-left: 0;
        }

        .result-line {
          font-size: 52px;
        }
      }
    </style>
  </head>

  <body>
    <div class="content">
      <div class="inputs">
        <div class="field">
          <label>DAY</label>

          <div class="input">
            <input type="number" id="dayIn" placeholder="DD" />
            <div class="error"></div>
          </div>
        </div>

        <div class="field">
          <label>MONTH</label>

          <div class="input">
            <input type="number" id="monthIn" placeholder="MM" />
            <div class="error"></div>
          </div>
        </div>

        <div class="field">
          <label>YEAR</label>

          <div class="input">
            <input type="number" id="yearIn" placeholder="YYYY" />
            <div class="error"></div>
          </div>
        </div>
      </div>

      <div class="divider">
        <hr />
        <button id="calculateBtn">&#8595;</button>
      </div>

      <div class="results">
        <div class="result-line"><span id="yearOut">--</span> years</div>

        <div class="result-line"><span id="monthOut">--</span> months</div>

        <div class="result-line"><span id="dayOut">--</span> days</div>
      </div>
    </div>

    <script>
      const dayIn = document.getElementById("dayIn");
      const monthIn = document.getElementById("monthIn");
      const yearIn = document.getElementById("yearIn");

      const dayOut = document.getElementById("dayOut");
      const monthOut = document.getElementById("monthOut");
      const yearOut = document.getElementById("yearOut");

      function showError(input, message) {
        input.nextElementSibling.textContent = message;
      }

      function clearError(input) {
        input.nextElementSibling.textContent = "";
      }

      function validateDay() {
        const value = dayIn.value;

        if (value === "") {
          showError(dayIn, "This field is required");
          return false;
        }

        if (Number(value) < 1 || Number(value) > 31) {
          showError(dayIn, "Must be a valid day");
          return false;
        }

        clearError(dayIn);
        return true;
      }

      function validateMonth() {
        const value = monthIn.value;

        if (value === "") {
          showError(monthIn, "This field is required");
          return false;
        }

        if (Number(value) < 1 || Number(value) > 12) {
          showError(monthIn, "Must be a valid month");
          return false;
        }

        clearError(monthIn);
        return true;
      }

      function validateYear() {
        const value = yearIn.value;

        if (value === "") {
          showError(yearIn, "This field is required");
          return false;
        }

        const currentYear = new Date().getFullYear();

        if (Number(value) > currentYear) {
          showError(yearIn, "Must be in past");
          return false;
        }

        clearError(yearIn);
        return true;
      }

      dayIn.addEventListener("blur", validateDay);
      monthIn.addEventListener("blur", validateMonth);
      yearIn.addEventListener("blur", validateYear);

      document.getElementById("calculateBtn").addEventListener("click", () => {
        const isDayValid = validateDay();
        const isMonthValid = validateMonth();
        const isYearValid = validateYear();

        if (!isDayValid || !isMonthValid || !isYearValid) {
          yearOut.textContent = "--";
          monthOut.textContent = "--";
          dayOut.textContent = "--";
          return;
        }

        const day = Number(dayIn.value);
        const month = Number(monthIn.value);
        const year = Number(yearIn.value);

        const birthDate = new Date(year, month - 1, day);

        // Invalid Date check
        if (
          birthDate.getDate() !== day ||
          birthDate.getMonth() !== month - 1 ||
          birthDate.getFullYear() !== year
        ) {
          showError(dayIn, "Must be a valid date");

          yearOut.textContent = "--";
          monthOut.textContent = "--";
          dayOut.textContent = "--";
          return;
        }

        const today = new Date();

        let years = today.getFullYear() - year;
        let months = today.getMonth() - (month - 1);
        let days = today.getDate() - day;

        if (days < 0) {
          months--;

          const previousMonthDays = new Date(
            today.getFullYear(),
            today.getMonth(),
            0,
          ).getDate();

          days += previousMonthDays;
        }

        if (months < 0) {
          years--;
          months += 12;
        }

        yearOut.textContent = years;
        monthOut.textContent = months;
        dayOut.textContent = days;
      });
    </script>
  </body>
</html>
